<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, Timestamp, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  // ─── Firebase 設定 ────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyPlaceholderKeyReplaceWithActualKey",
    authDomain: "salon-attendance-5ef32.firebaseapp.com",
    projectId: "salon-attendance-5ef32",
    storageBucket: "salon-attendance-5ef32.appspot.com",
    messagingSenderId: "000000000000",
    appId: "1:000000000000:web:placeholder"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ─── グローバル変数 ───────────────────────────────────────────────
  let currentUser = null;
  let currentRole = null;
  let selectedStore = null;
  let selectedStaff = null;
  let realtimeUnsubscribers = [];
  let currentView = 'login';
  let editingStaffId = null;

  // 定数
  const OVERTIME_RATE = 1.25;
  const NIGHT_RATE = 1.25;    // 深夜割増 22:00-5:00
  const HOLIDAY_RATE = 1.35;  // 休日割増
  const ARTICLE36_MONTHLY_LIMIT = 45;   // 月45時間
  const ARTICLE36_YEARLY_LIMIT = 360;   // 年360時間
  const ALERT_THRESHOLD = 0.8;          // 80%で警告

  // ─── ユーティリティ ───────────────────────────────────────────────
  function formatDate(date) {
    if (!date) return '';
    const d = date instanceof Date ? date : (date.toDate ? date.toDate() : new Date(date));
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatTime(date) {
    if (!date) return '--:--';
    const d = date instanceof Date ? date : (date.toDate ? date.toDate() : new Date(date));
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function formatDuration(minutes) {
    if (!minutes && minutes !== 0) return '--:--';
    const h = Math.floor(minutes / 60);
    const m = Math.round(minutes % 60);
    return `${h}h${String(m).padStart(2,'0')}m`;
  }

  function minutesToHours(minutes) {
    return Math.round(minutes / 60 * 10) / 10;
  }

  function getToday() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function getYearMonth(dateStr) {
    return dateStr ? dateStr.substring(0, 7) : '';
  }

  function isNightTime(date) {
    const h = date.getHours();
    return h >= 22 || h < 5;
  }

  function isHoliday(date) {
    return date.getDay() === 0 || date.getDay() === 6;
  }

  // 残業・深夜・休日の計算
  function calculateWage(record, hourlyRate) {
    if (!record.clockIn || !record.clockOut) return { total: 0, regular: 0, overtime: 0, night: 0, holiday: 0, totalMinutes: 0 };
    
    const inTime = record.clockIn.toDate ? record.clockIn.toDate() : new Date(record.clockIn);
    const outTime = record.clockOut.toDate ? record.clockOut.toDate() : new Date(record.clockOut);
    const breakMins = record.breakMinutes || 0;
    const workMins = Math.max(0, (outTime - inTime) / 60000 - breakMins);
    const workHours = workMins / 60;

    let regularHours = Math.min(workHours, 8);
    let overtimeHours = Math.max(0, workHours - 8);
    
    // 深夜時間の計算（簡易: 22時以降・5時未満）
    let nightHours = 0;
    let current = new Date(inTime);
    while (current < outTime) {
      if (isNightTime(current)) nightHours += 1/60;
      current = new Date(current.getTime() + 60000);
    }
    nightHours = Math.min(nightHours, workHours);

    const holidayMultiplier = isHoliday(inTime) ? HOLIDAY_RATE : 1;
    const regularWage = regularHours * hourlyRate * holidayMultiplier;
    const overtimeWage = overtimeHours * hourlyRate * OVERTIME_RATE * holidayMultiplier;
    const nightWage = nightHours * hourlyRate * (NIGHT_RATE - 1);

    return {
      total: Math.round(regularWage + overtimeWage + nightWage),
      regular: Math.round(regularWage),
      overtime: Math.round(overtimeWage),
      night: Math.round(nightWage),
      holiday: isHoliday(inTime),
      totalMinutes: Math.round(workMins),
      regularHours,
      overtimeHours,
      nightHours
    };
  }

  // ─── Firestore CRUD ───────────────────────────────────────────────
  
  // 初期データ投入（初回のみ）
  async function initializeData() {
    // 管理者アカウント確認
    const adminRef = doc(db, 'users', 'admin');
    const adminSnap = await getDoc(adminRef);
    if (!adminSnap.exists()) {
      await setDoc(adminRef, {
        name: '管理者',
        role: 'admin',
        password: 'admin2024',
        createdAt: serverTimestamp()
      });
    }
    // サンプル店舗
    const storesSnap = await getDocs(collection(db, 'stores'));
    if (storesSnap.empty) {
      const stores = [
        { name: '渋谷店', address: '東京都渋谷区', phone: '03-0000-0001', active: true },
        { name: '新宿店', address: '東京都新宿区', phone: '03-0000-0002', active: true },
        { name: '銀座店', address: '東京都中央区銀座', phone: '03-0000-0003', active: true },
      ];
      for (const s of stores) {
        await addDoc(collection(db, 'stores'), { ...s, createdAt: serverTimestamp() });
      }
    }
  }

  // ログイン
  async function login(id, password) {
    showLoading(true);
    try {
      // 管理者チェック
      const adminSnap = await getDoc(doc(db, 'users', 'admin'));
      if (adminSnap.exists()) {
        const admin = adminSnap.data();
        if ((id === 'admin' || id === admin.name) && password === admin.password) {
          currentUser = { id: 'admin', ...admin };
          currentRole = 'admin';
          showAdminDashboard();
          return;
        }
      }
      // スタッフチェック
      const staffQ = query(collection(db, 'staff'), where('staffId', '==', id), where('active', '==', true));
      const staffSnap = await getDocs(staffQ);
      if (!staffSnap.empty) {
        const staffDoc = staffSnap.docs[0];
        const staff = staffDoc.data();
        if (staff.password === password) {
          currentUser = { id: staffDoc.id, ...staff };
          currentRole = 'staff';
          showStoreSelection();
          return;
        }
      }
      showError('IDまたはパスワードが正しくありません');
    } catch(e) {
      showError('ログインエラー: ' + e.message);
    } finally {
      showLoading(false);
    }
  }

  async function getStores() {
    const snap = await getDocs(query(collection(db, 'stores'), where('active', '==', true)));
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  async function getAllStores() {
    const snap = await getDocs(collection(db, 'stores'));
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  async function getStaffByStore(storeId) {
    const q = query(collection(db, 'staff'), where('storeId', '==', storeId), where('active', '==', true));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  async function getAllStaff() {
    const snap = await getDocs(collection(db, 'staff'));
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  async function getTodayRecord(staffId) {
    const today = getToday();
    const q = query(collection(db, 'attendance'), 
      where('staffId', '==', staffId), 
      where('date', '==', today));
    const snap = await getDocs(q);
    if (snap.empty) return null;
    return { id: snap.docs[0].id, ...snap.docs[0].data() };
  }

  async function clockIn(staffId, storeId) {
    const today = getToday();
    const existing = await getTodayRecord(staffId);
    if (existing && existing.clockIn) {
      showError('すでに出勤打刻済みです');
      return;
    }
    const now = Timestamp.now();
    if (existing) {
      await updateDoc(doc(db, 'attendance', existing.id), { clockIn: now, storeId });
    } else {
      await addDoc(collection(db, 'attendance'), {
        staffId, storeId, date: today,
        clockIn: now, clockOut: null,
        breakMinutes: 0, breakStart: null,
        onBreak: false, memo: '',
        createdAt: serverTimestamp()
      });
    }
    await logAction(staffId, storeId, '出勤', now.toDate());
    showSuccess('出勤打刻しました');
  }

  async function clockOut(staffId, storeId) {
    const existing = await getTodayRecord(staffId);
    if (!existing || !existing.clockIn) {
      showError('出勤打刻がありません');
      return;
    }
    if (existing.clockOut) {
      showError('すでに退勤打刻済みです');
      return;
    }
    const now = Timestamp.now();
    await updateDoc(doc(db, 'attendance', existing.id), { clockOut: now });
    await logAction(staffId, storeId, '退勤', now.toDate());
    showSuccess('退勤打刻しました');
  }

  async function toggleBreak(staffId) {
    const existing = await getTodayRecord(staffId);
    if (!existing || !existing.clockIn || existing.clockOut) {
      showError('出勤中のみ休憩できます');
      return;
    }
    const now = Timestamp.now();
    if (!existing.onBreak) {
      await updateDoc(doc(db, 'attendance', existing.id), { onBreak: true, breakStart: now });
      showSuccess('休憩開始しました');
    } else {
      const breakStart = existing.breakStart.toDate ? existing.breakStart.toDate() : new Date(existing.breakStart);
      const addMins = Math.round((now.toDate() - breakStart) / 60000);
      await updateDoc(doc(db, 'attendance', existing.id), {
        onBreak: false, breakStart: null,
        breakMinutes: (existing.breakMinutes || 0) + addMins
      });
      showSuccess('休憩終了しました');
    }
  }

  async function sendMemo(staffId, storeId, memo) {
    const existing = await getTodayRecord(staffId);
    if (!existing) {
      await addDoc(collection(db, 'attendance'), {
        staffId, storeId, date: getToday(),
        clockIn: null, clockOut: null,
        breakMinutes: 0, onBreak: false,
        memo, createdAt: serverTimestamp()
      });
    } else {
      await updateDoc(doc(db, 'attendance', existing.id), { memo });
    }
    await addDoc(collection(db, 'memos'), {
      staffId, storeId, memo,
      createdAt: serverTimestamp(), date: getToday()
    });
    showSuccess('メモを送信しました');
  }

  async function logAction(staffId, storeId, action, time) {
    await addDoc(collection(db, 'logs'), {
      staffId, storeId, action,
      time: Timestamp.fromDate(time),
      date: getToday(), createdAt: serverTimestamp()
    });
  }

  // 月次データ取得
  async function getMonthlyAttendance(staffId, yearMonth) {
    const startDate = yearMonth + '-01';
    const endDate = yearMonth + '-31';
    const q = query(collection(db, 'attendance'),
      where('staffId', '==', staffId),
      where('date', '>=', startDate),
      where('date', '<=', endDate));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  // 36協定チェック
  async function check36Agreement(staffId) {
    const now = new Date();
    const yearMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const records = await getMonthlyAttendance(staffId, yearMonth);
    let monthlyMins = 0;
    records.forEach(r => {
      if (r.clockIn && r.clockOut) {
        const inn = r.clockIn.toDate ? r.clockIn.toDate() : new Date(r.clockIn);
        const out = r.clockOut.toDate ? r.clockOut.toDate() : new Date(r.clockOut);
        monthlyMins += Math.max(0, (out - inn) / 60000 - (r.breakMinutes || 0));
      }
    });
    const monthlyHours = monthlyMins / 60;
    const monthlyOvertime = Math.max(0, monthlyHours - 8 * 22); // 月の法定労働時間（近似）
    return {
      monthlyHours: Math.round(monthlyHours * 10) / 10,
      monthlyOvertime: Math.round(monthlyOvertime * 10) / 10,
      monthlyAlert: monthlyOvertime >= ARTICLE36_MONTHLY_LIMIT * ALERT_THRESHOLD,
      monthlyDanger: monthlyOvertime >= ARTICLE36_MONTHLY_LIMIT
    };
  }

  // ─── UI 描画系 ────────────────────────────────────────────────────

  function showLoading(show) {
    document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
  }

  function showError(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast toast-error show';
    setTimeout(() => el.classList.remove('show'), 3500);
  }

  function showSuccess(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast toast-success show';
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function clearView() {
    realtimeUnsubscribers.forEach(u => u());
    realtimeUnsubscribers = [];
    document.getElementById('app').innerHTML = '';
  }

  // ─── ログイン画面 ─────────────────────────────────────────────────
  function showLogin() {
    currentView = 'login';
    clearView();
    document.getElementById('app').innerHTML = `
      <div class="login-wrapper">
        <div class="login-card">
          <div class="login-brand">
            <div class="brand-mark">✦</div>
            <h1 class="brand-title">SALON<br>ATTENDANCE</h1>
            <p class="brand-sub">出退勤管理システム</p>
          </div>
          <div class="login-form">
            <div class="form-group">
              <label class="form-label">スタッフID / 管理者ID</label>
              <input type="text" id="login-id" class="form-input" placeholder="例: staff001" autocomplete="username">
            </div>
            <div class="form-group">
              <label class="form-label">パスワード</label>
              <input type="password" id="login-pass" class="form-input" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn-primary btn-full" onclick="window._login()">ログイン</button>
          </div>
        </div>
        <div class="login-deco">
          <div class="deco-circle c1"></div>
          <div class="deco-circle c2"></div>
          <div class="deco-circle c3"></div>
        </div>
      </div>`;
    document.getElementById('login-pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') window._login();
    });
  }

  window._login = async function() {
    const id = document.getElementById('login-id').value.trim();
    const pass = document.getElementById('login-pass').value;
    if (!id || !pass) { showError('IDとパスワードを入力してください'); return; }
    await login(id, pass);
  };

  // ─── 店舗選択（スタッフ）─────────────────────────────────────────
  async function showStoreSelection() {
    currentView = 'store-select';
    clearView();
    showLoading(true);
    const stores = await getStores();
    showLoading(false);
    document.getElementById('app').innerHTML = `
      <div class="page-wrapper">
        ${renderStaffHeader()}
        <div class="page-content">
          <div class="page-title-row">
            <h2 class="page-title">店舗を選択</h2>
          </div>
          <div class="store-grid">
            ${stores.map(s => `
              <button class="store-card" onclick="window._selectStore('${s.id}','${s.name}')">
                <div class="store-icon">✦</div>
                <div class="store-name">${s.name}</div>
                <div class="store-addr">${s.address || ''}</div>
              </button>`).join('')}
          </div>
        </div>
      </div>`;
  }

  window._selectStore = async function(storeId, storeName) {
    selectedStore = { id: storeId, name: storeName };
    await showStaffList();
  };

  // ─── スタッフ一覧（スタッフビュー）──────────────────────────────
  async function showStaffList() {
    currentView = 'staff-list';
    clearView();
    showLoading(true);
    const staffList = await getStaffByStore(selectedStore.id);
    showLoading(false);
    document.getElementById('app').innerHTML = `
      <div class="page-wrapper">
        ${renderStaffHeader()}
        <div class="page-content">
          <div class="page-title-row">
            <button class="btn-back" onclick="window._back()">← 店舗選択へ</button>
            <h2 class="page-title">${selectedStore.name} — スタッフ</h2>
          </div>
          <div class="staff-grid">
            ${staffList.length === 0 ? '<p class="empty-msg">スタッフが登録されていません</p>' :
              staffList.map(s => `
                <button class="staff-card ${currentUser.id === s.id ? 'staff-card-me' : ''}"
                  onclick="window._selectStaff('${s.id}','${s.name}')">
                  <div class="staff-avatar">${s.name.charAt(0)}</div>
                  <div class="staff-info">
                    <div class="staff-name">${s.name}</div>
                    <div class="staff-role-label">${s.role || 'スタイリスト'}</div>
                  </div>
                  ${currentUser.id === s.id ? '<span class="badge-me">自分</span>' : ''}
                </button>`).join('')}
          </div>
        </div>
      </div>`;
  }

  window._back = function() {
    if (currentView === 'staff-list') showStoreSelection();
    else if (currentView === 'clock') showStaffList();
    else if (currentView === 'staff-view') showLogin();
  };

  window._selectStaff = function(staffId, staffName) {
    selectedStaff = { id: staffId, name: staffName };
    showClockPanel();
  };

  function renderStaffHeader() {
    return `<header class="app-header">
      <div class="header-brand">✦ SALON ATTENDANCE</div>
      <div class="header-user">
        <span class="header-username">${currentUser?.name || ''}</span>
        <button class="btn-logout" onclick="window._logout()">ログアウト</button>
      </div>
    </header>`;
  }

  // ─── 打刻パネル ───────────────────────────────────────────────────
  async function showClockPanel() {
    currentView = 'clock';
    clearView();
    showLoading(true);
    const record = await getTodayRecord(selectedStaff.id);
    const alert36 = await check36Agreement(selectedStaff.id);
    showLoading(false);

    const statusText = !record || !record.clockIn ? '未出勤' :
      record.clockOut ? '退勤済' :
      record.onBreak ? '休憩中' : '出勤中';
    const statusClass = !record || !record.clockIn ? 'status-off' :
      record.clockOut ? 'status-done' :
      record.onBreak ? 'status-break' : 'status-on';

    document.getElementById('app').innerHTML = `
      <div class="page-wrapper">
        ${renderStaffHeader()}
        <div class="page-content">
          <div class="page-title-row">
            <button class="btn-back" onclick="window._back()">← スタッフ選択へ</button>
            <h2 class="page-title">${selectedStaff.name} / ${selectedStore.name}</h2>
          </div>

          ${alert36.monthlyDanger ? `<div class="alert36 alert-danger">⚠️ 36協定超過！ 今月残業${alert36.monthlyOvertime}h（上限${ARTICLE36_MONTHLY_LIMIT}h）</div>` :
            alert36.monthlyAlert ? `<div class="alert36 alert-warn">⚠️ 36協定警告: 今月残業${alert36.monthlyOvertime}h（上限80%超）</div>` : ''}

          <div class="clock-panel">
            <div class="clock-status-area">
              <div class="clock-date">${formatDate(new Date())}</div>
              <div class="clock-time-live" id="live-clock"></div>
              <div class="status-badge ${statusClass}">${statusText}</div>
            </div>

            <div class="clock-times">
              <div class="time-item">
                <span class="time-label">出勤</span>
                <span class="time-value">${record?.clockIn ? formatTime(record.clockIn.toDate ? record.clockIn.toDate() : new Date(record.clockIn)) : '--:--'}</span>
              </div>
              <div class="time-item">
                <span class="time-label">退勤</span>
                <span class="time-value">${record?.clockOut ? formatTime(record.clockOut.toDate ? record.clockOut.toDate() : new Date(record.clockOut)) : '--:--'}</span>
              </div>
              <div class="time-item">
                <span class="time-label">休憩</span>
                <span class="time-value">${record?.breakMinutes ? record.breakMinutes + 'm' : '0m'}</span>
              </div>
            </div>

            <div class="clock-actions">
              <button class="btn-clock btn-in" 
                ${record?.clockIn ? 'disabled' : ''}
                onclick="window._clockIn()">出　勤</button>
              <button class="btn-clock btn-break ${record?.onBreak ? 'btn-break-end' : ''}"
                ${!record?.clockIn || record?.clockOut ? 'disabled' : ''}
                onclick="window._toggleBreak()">${record?.onBreak ? '休憩終了' : '休憩開始'}</button>
              <button class="btn-clock btn-out"
                ${!record?.clockIn || record?.clockOut || record?.onBreak ? 'disabled' : ''}
                onclick="window._clockOut()">退　勤</button>
            </div>

            <div class="memo-area">
              <label class="form-label">メモ・申し送り</label>
              <textarea id="memo-input" class="form-textarea" placeholder="管理者へのメモを入力...">${record?.memo || ''}</textarea>
              <button class="btn-secondary" onclick="window._sendMemo()">メモを送信</button>
            </div>
          </div>
        </div>
      </div>`;

    // ライブ時計
    function updateClock() {
      const el = document.getElementById('live-clock');
      if (el) el.textContent = formatTime(new Date());
    }
    updateClock();
    const clockInterval = setInterval(updateClock, 1000);
    realtimeUnsubscribers.push(() => clearInterval(clockInterval));
  }

  window._clockIn = async function() {
    showLoading(true);
    await clockIn(selectedStaff.id, selectedStore.id);
    showLoading(false);
    await showClockPanel();
  };
  window._clockOut = async function() {
    showLoading(true);
    await clockOut(selectedStaff.id, selectedStore.id);
    showLoading(false);
    await showClockPanel();
  };
  window._toggleBreak = async function() {
    showLoading(true);
    await toggleBreak(selectedStaff.id);
    showLoading(false);
    await showClockPanel();
  };
  window._sendMemo = async function() {
    const memo = document.getElementById('memo-input').value.trim();
    if (!memo) { showError('メモを入力してください'); return; }
    showLoading(true);
    await sendMemo(selectedStaff.id, selectedStore.id, memo);
    showLoading(false);
  };

  window._logout = function() {
    currentUser = null; currentRole = null;
    selectedStore = null; selectedStaff = null;
    clearView();
    showLogin();
  };

  // ─── 管理者ダッシュボード ─────────────────────────────────────────
  async function showAdminDashboard() {

  // リアルタイム出勤状況
  async function renderAdminRealtime() {
    const content = document.getElementById('admin-content');
    const stores = await getAllStores();
    const storeMap = {}; stores.forEach(s => storeMap[s.id] = s.name);
    const allStaff = await getAllStaff();
    const staffMap = {}; allStaff.forEach(s => staffMap[s.id] = s);
    const today = getToday();

    content.innerHTML = `
      <div class="admin-view">
        <div class="admin-view-header">
          <h2 class="admin-view-title">リアルタイム出勤状況</h2>

    function renderTable(docs) {
      const activeStore = document.querySelector('.filter-btn.active')?.dataset.store || 'all';
      const rows = docs
        .filter(d => activeStore === 'all' || d.storeId === activeStore)
        .map(d => {

          const inn = d.clockIn ? (d.clockIn.toDate ? d.clockIn.toDate() : new Date(d.clockIn)) : null;
          const out = d.clockOut ? (d.clockOut.toDate ? d.clockOut.toDate() : new Date(d.clockOut)) : null;
          const status = !inn ? 'off' : out ? 'done' : d.onBreak ? 'break' : 'on';
          const statusLabel = { off: '未出勤', done: '退勤済', break: '休憩中', on: '出勤中' }[status];
          const statusClass = { off: 'badge-off', done: 'badge-done', break: 'badge-break', on: 'badge-on' }[status];
          const alert36Class = '';
          return `<tr>
            <td>${staff.name}</td>
            <td>${storeMap[d.storeId] || d.storeId}</td>
            <td><span class="table-badge ${statusClass}">${statusLabel}</span></td>
            <td>${inn ? formatTime(inn) : '--:--'}</td>
            <td>${out ? formatTime(out) : '--:--'}</td>

      const table = `
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr>
              <th>スタッフ</th><th>店舗</th><th>状態</th>
              <th>出勤</th><th>退勤</th><th>休憩</th><th>メモ</th><th>操作</th>
            </tr></thead>
            <tbody>${rows || '<tr><td colspan="8" class="empty-cell">本日の打刻はありません</td></tr>'}</tbody>
          </table>

    }

    // リアルタイムリスナー
    const q = query(collection(db, 'attendance'), where('date', '==', today));
    const unsub = onSnapshot(q, snap => {
      renderTable(snap.docs.map(d => ({ id: d.id, ...d.data() })));

    window._filterStore = function(el, storeId) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

  // 打刻修正モーダル
  window._editRecord = async function(recordId) {
    const snap = await getDoc(doc(db, 'attendance', recordId));
    if (!snap.exists()) { showError('レコードが見つかりません'); return; }
    const rec = snap.data();
    const allStaff = await getAllStaff();
    const staff = allStaff.find(s => s.id === rec.staffId) || { name: rec.staffId };
    const inn = rec.clockIn ? (rec.clockIn.toDate ? rec.clockIn.toDate() : new Date(rec.clockIn)) : null;
    const out = rec.clockOut ? (rec.clockOut.toDate ? rec.clockOut.toDate() : new Date(rec.clockOut)) : null;

    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal-card">
        <h3 class="modal-title">打刻修正 — ${staff.name}</h3>
        <div class="form-group">
          <label class="form-label">出勤時刻</label>

        </div>

          <button class="btn-secondary" onclick="window._viewCorrectionHistory('${recordId}')">修正履歴を見る</button>
          <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">キャンセル</button>

  window._saveEdit = async function(recordId, date) {
    const inVal = document.getElementById('edit-in').value;
    const outVal = document.getElementById('edit-out').value;
    const breakVal = parseInt(document.getElementById('edit-break').value) || 0;

    // 修正前の値を取得（履歴用）
    const beforeSnap = await getDoc(doc(db, 'attendance', recordId));
    const before = beforeSnap.exists() ? beforeSnap.data() : {};
    const beforeIn = before.clockIn ? formatTime(before.clockIn.toDate ? before.clockIn.toDate() : new Date(before.clockIn)) : '--:--';
    const beforeOut = before.clockOut ? formatTime(before.clockOut.toDate ? before.clockOut.toDate() : new Date(before.clockOut)) : '--:--';
    const beforeBreak = before.breakMinutes || 0;

    const updates = { breakMinutes: breakVal };
    if (inVal) {
      const d = new Date(date + 'T' + inVal + ':00');
      updates.clockIn = Timestamp.fromDate(d);
    }
    if (outVal) {
      const d = new Date(date + 'T' + outVal + ':00');
      updates.clockOut = Timestamp.fromDate(d);
    }
    await updateDoc(doc(db, 'attendance', recordId), updates);

    // 修正履歴を記録
    await addDoc(collection(db, 'correctionLogs'), {
      recordId, staffId: before.staffId || null, storeId: before.storeId || null,
      date: before.date || date,
      editorId: currentUser?.id || 'admin', editorName: currentUser?.name || '管理者',
      before: { clockIn: beforeIn, clockOut: beforeOut, breakMinutes: beforeBreak },
      after: { clockIn: inVal || beforeIn, clockOut: outVal || beforeOut, breakMinutes: breakVal },
      createdAt: serverTimestamp()
    });

    document.querySelector('.modal-overlay')?.remove();
    showSuccess('打刻を修正しました');
    // 打刻修正画面を開いている場合は再描画
    if (currentView === 'admin' && document.getElementById('correction-results')) {
      window._searchCorrection && window._searchCorrection();
    }
  };

  async function loadMonthlyData(yearMonth, storeFilter, allStaff, storeMap) {
    const el = document.getElementById('monthly-content');
    el.innerHTML = '<div class="loading-inner">集計中...</div>';
    const rows = [];
    let csvData = [['スタッフ名', '店舗', '日付', '出勤', '退勤', '休憩(分)', '勤務時間', '残業時間', '深夜時間', '基本給', '残業代', '深夜代', '合計', '36協定']];

    for (const staff of allStaff) {
      if (storeFilter !== 'all' && staff.storeId !== storeFilter) continue;
      const records = await getMonthlyAttendance(staff.id, yearMonth);
      let totalMins = 0, totalOT = 0, totalWage = 0;
      const staffRows = records.map(r => {
        const wage = calculateWage(r, staff.hourlyRate || 1000);
        totalMins += wage.totalMinutes;
        totalOT += wage.overtimeHours * 60;
        totalWage += wage.total;
        csvData.push([
          staff.name, storeMap[staff.storeId] || staff.storeId, r.date,
          r.clockIn ? formatTime(r.clockIn.toDate ? r.clockIn.toDate() : new Date(r.clockIn)) : '',
          r.clockOut ? formatTime(r.clockOut.toDate ? r.clockOut.toDate() : new Date(r.clockOut)) : '',
          r.breakMinutes || 0,
          formatDuration(wage.totalMinutes),
          Math.round(wage.overtimeHours * 10) / 10 + 'h',
          Math.round((wage.nightHours || 0) * 10) / 10 + 'h',
          wage.regular, wage.overtime, wage.night, wage.total,
          wage.holiday ? '休日' : ''
        ]);
        return `<tr>
          <td>${r.date}</td>
          <td>${r.clockIn ? formatTime(r.clockIn.toDate ? r.clockIn.toDate() : new Date(r.clockIn)) : '--'}</td>
          <td>${r.clockOut ? formatTime(r.clockOut.toDate ? r.clockOut.toDate() : new Date(r.clockOut)) : '--'}</td>
          <td>${r.breakMinutes || 0}m</td>
          <td>${formatDuration(wage.totalMinutes)}</td>
          <td>${Math.round(wage.overtimeHours * 10) / 10}h</td>
          <td>¥${wage.total.toLocaleString()}</td>
          ${wage.holiday ? '<td><span class="badge-holiday">休日</span></td>' : '<td></td>'}
        </tr>`;
      }).join('');

      const totalHours = minutesToHours(totalMins);
      const otHours = minutesToHours(totalOT);
      const alert36 = otHours >= ARTICLE36_MONTHLY_LIMIT ? 'alert-row-danger' :
        otHours >= ARTICLE36_MONTHLY_LIMIT * ALERT_THRESHOLD ? 'alert-row-warn' : '';

      rows.push(`
        <div class="monthly-staff-block ${alert36}">
          <div class="staff-block-header">
            <span class="staff-block-name">${staff.name}</span>
            <span class="staff-block-store">${storeMap[staff.storeId] || '—'}</span>
            <span class="staff-block-stats">
              総勤務: <strong>${totalHours}h</strong> ／
              残業: <strong ${otHours >= ARTICLE36_MONTHLY_LIMIT ? 'class="text-danger"' : ''}>${otHours}h</strong> ／
              給与合計: <strong>¥${totalWage.toLocaleString()}</strong>
              ${otHours >= ARTICLE36_MONTHLY_LIMIT ? '<span class="badge-alert">36協定超過</span>' :
                otHours >= ARTICLE36_MONTHLY_LIMIT * ALERT_THRESHOLD ? '<span class="badge-warn">36協定警告</span>' : ''}
            </span>
          </div>
          ${staffRows ? `<table class="data-table data-table-sm">
            <thead><tr><th>日付</th><th>出勤</th><th>退勤</th><th>休憩</th><th>勤務</th><th>残業</th><th>給与</th><th>区分</th></tr></thead>
            <tbody>${staffRows}</tbody>
          </table>` : '<p class="empty-msg-sm">打刻データなし</p>'}
        </div>`);
    }

    el.innerHTML = rows.join('') || '<p class="empty-msg">データがありません</p>';

    // CSV出力用に保存
    window._csvData = csvData;
  }

  window._exportCSV = function() {
    if (!window._csvData) { showError('先にデータを表示してください'); return; }
    const bom = '\uFEFF';
    const csv = bom + window._csvData.map(row => row.map(c => `"${c}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `給与計算_${document.getElementById('report-month')?.value || ''}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  async function loadDailySummary(date, storeMap, staffMap) {
    const el = document.getElementById('summary-content');
    el.innerHTML = '<div class="loading-inner">集計中...</div>';
    const q = query(collection(db, 'attendance'), where('date', '==', date));
    const snap = await getDocs(q);
    const records = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // 店舗別集計
    const storeSummary = {};
    records.forEach(r => {
      if (!storeSummary[r.storeId]) storeSummary[r.storeId] = { total: 0, onShift: 0, onBreak: 0, done: 0, records: [] };
      storeSummary[r.storeId].total++;
      if (r.clockIn && !r.clockOut) {
        if (r.onBreak) storeSummary[r.storeId].onBreak++;
        else storeSummary[r.storeId].onShift++;
      }
      if (r.clockOut) storeSummary[r.storeId].done++;
      storeSummary[r.storeId].records.push(r);
    });

    let html = '';
    for (const [storeId, data] of Object.entries(storeSummary)) {
      html += `
        <div class="summary-store-block">
          <h3 class="summary-store-name">${storeMap[storeId] || storeId}</h3>
          <div class="summary-stats-row">
            <div class="stat-box"><span class="stat-num">${data.total}</span><span class="stat-label">総人数</span></div>
            <div class="stat-box stat-on"><span class="stat-num">${data.onShift}</span><span class="stat-label">出勤中</span></div>
            <div class="stat-box stat-break"><span class="stat-num">${data.onBreak}</span><span class="stat-label">休憩中</span></div>
            <div class="stat-box stat-done"><span class="stat-num">${data.done}</span><span class="stat-label">退勤済</span></div>
          </div>
          <table class="data-table data-table-sm">
            <thead><tr><th>スタッフ</th><th>状態</th><th>出勤</th><th>退勤</th><th>勤務時間</th></tr></thead>
            <tbody>
              ${data.records.map(r => {
                const staff = staffMap[r.staffId] || { name: r.staffId };
                const inn = r.clockIn ? (r.clockIn.toDate ? r.clockIn.toDate() : new Date(r.clockIn)) : null;
                const out = r.clockOut ? (r.clockOut.toDate ? r.clockOut.toDate() : new Date(r.clockOut)) : null;
                const wageInfo = calculateWage(r, staff.hourlyRate || 1000);
                const status = !inn ? 'off' : out ? 'done' : r.onBreak ? 'break' : 'on';
                const badges = { off:'badge-off', done:'badge-done', break:'badge-break', on:'badge-on' };
                const labels = { off:'未出勤', done:'退勤済', break:'休憩中', on:'出勤中' };
                return `<tr>
                  <td>${staff.name}</td>
                  <td><span class="table-badge ${badges[status]}">${labels[status]}</span></td>
                  <td>${inn ? formatTime(inn) : '--'}</td>
                  <td>${out ? formatTime(out) : '--'}</td>
                  <td>${formatDuration(wageInfo.totalMinutes)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
    }
    el.innerHTML = html || '<p class="empty-msg">この日の打刻データはありません</p>';
  }

          <thead><tr><th>時刻</th><th>スタッフ</th><th>店舗</th><th>アクション</th></tr></thead>
          <tbody>
            ${logs.length === 0 ? '<tr><td colspan="4" class="empty-cell">ログなし</td></tr>' :
              logs.map(l => {
                const staff = staffMap[l.staffId] || { name: l.staffId };
                const t = l.time ? (l.time.toDate ? l.time.toDate() : new Date(l.time)) : null;
                return `<tr>
                  <td class="mono">${t ? formatTime(t) : '--'}</td>
                  <td>${staff.name}</td>
                  <td>${storeMap[l.storeId] || l.storeId}</td>
                  <td><span class="action-badge action-${l.action === '出勤' ? 'in' : l.action === '退勤' ? 'out' : 'break'}">${l.action}</span></td>
                </tr>`;
              }).join('')}
          </tbody>
        </table>
      </div>`;
  }

  // 打刻修正（過去日付検索つき）
  async function renderCorrection() {
    const content = document.getElementById('admin-content');
    const stores = await getAllStores();
    const allStaff = await getAllStaff();
    const storeMap = {}; stores.forEach(s => storeMap[s.id] = s.name);
    const staffMap = {}; allStaff.forEach(s => staffMap[s.id] = s);

    const today = getToday();
    const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
    const weekAgoStr = `${weekAgo.getFullYear()}-${String(weekAgo.getMonth()+1).padStart(2,'0')}-${String(weekAgo.getDate()).padStart(2,'0')}`;

    content.innerHTML = `
      <div class="admin-view">
        <div class="admin-view-header">
          <h2 class="admin-view-title">打刻修正</h2>
          <div class="admin-view-date">スタッフ・日付を指定して過去の打刻を検索・修正できます</div>
        </div>

        <div class="correction-search-bar">
          <div class="form-group">
            <label class="form-label">期間（開始）</label>
            <input type="date" id="corr-from" class="form-input-sm" value="${weekAgoStr}">
          </div>
          <div class="form-group">
            <label class="form-label">期間（終了）</label>
            <input type="date" id="corr-to" class="form-input-sm" value="${today}">
          </div>
          <div class="form-group">
            <label class="form-label">店舗</label>
            <select id="corr-store" class="form-input-sm">
              <option value="all">全店舗</option>
              ${stores.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">スタッフ</label>
            <select id="corr-staff" class="form-input-sm">
              <option value="all">全スタッフ</option>
              ${allStaff.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
            </select>
          </div>
          <button class="btn-primary btn-sm" onclick="window._searchCorrection()">検索</button>
        </div>

        <div id="correction-results"></div>
      </div>`;

    // 店舗を選んだらスタッフを絞り込む
    document.getElementById('corr-store').addEventListener('change', (e) => {
      const storeId = e.target.value;
      const staffSelect = document.getElementById('corr-staff');
      const filtered = storeId === 'all' ? allStaff : allStaff.filter(s => s.storeId === storeId);
      staffSelect.innerHTML = `<option value="all">全スタッフ</option>` +
        filtered.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    });

    window._searchCorrection = async function() {
      const from = document.getElementById('corr-from').value;
      const to = document.getElementById('corr-to').value;
      const storeFilter = document.getElementById('corr-store').value;
      const staffFilter = document.getElementById('corr-staff').value;
      await loadCorrectionResults(from, to, storeFilter, staffFilter, staffMap, storeMap);
    };

    await window._searchCorrection();
  }

  async function loadCorrectionResults(from, to, storeFilter, staffFilter, staffMap, storeMap) {
    const el = document.getElementById('correction-results');
    el.innerHTML = '<div class="loading-inner">検索中...</div>';

    if (!from || !to) {
      el.innerHTML = '<p class="empty-msg">開始日と終了日を指定してください</p>';
      return;
    }

    let q;
    if (staffFilter !== 'all') {
      q = query(collection(db, 'attendance'),
        where('staffId', '==', staffFilter),
        where('date', '>=', from), where('date', '<=', to));
    } else {
      q = query(collection(db, 'attendance'),
        where('date', '>=', from), where('date', '<=', to));
    }

    const snap = await getDocs(q);
    let records = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    if (storeFilter !== 'all') {
      records = records.filter(r => r.storeId === storeFilter);
    }

    // 日付降順 → スタッフ名昇順
    records.sort((a, b) => {
      if (a.date !== b.date) return b.date.localeCompare(a.date);
      const an = staffMap[a.staffId]?.name || a.staffId;
      const bn = staffMap[b.staffId]?.name || b.staffId;
      return an.localeCompare(bn);
    });

    if (records.length === 0) {
      el.innerHTML = '<p class="empty-msg">該当する打刻データがありません</p>';
      return;
    }

    const rows = records.map(r => {
      const staff = staffMap[r.staffId] || { name: r.staffId };
      const inn = r.clockIn ? (r.clockIn.toDate ? r.clockIn.toDate() : new Date(r.clockIn)) : null;
      const out = r.clockOut ? (r.clockOut.toDate ? r.clockOut.toDate() : new Date(r.clockOut)) : null;
      const status = !inn ? 'off' : out ? 'done' : r.onBreak ? 'break' : 'on';
      const labels = { off: '未出勤', done: '退勤済', break: '休憩中', on: '出勤中' };
      const badges = { off: 'badge-off', done: 'badge-done', break: 'badge-break', on: 'badge-on' };
      return `<tr>
        <td class="mono">${r.date}</td>
        <td>${staff.name}</td>
        <td>${storeMap[r.storeId] || r.storeId}</td>
        <td><span class="table-badge ${badges[status]}">${labels[status]}</span></td>
        <td>${inn ? formatTime(inn) : '--:--'}</td>
        <td>${out ? formatTime(out) : '--:--'}</td>
        <td>${r.breakMinutes || 0}m</td>
        <td>
          <button class="btn-sm" onclick="window._editRecord('${r.id}')">修正</button>
          <button class="btn-sm" onclick="window._viewCorrectionHistory('${r.id}')">履歴</button>
        </td>
      </tr>`;
    }).join('');

    el.innerHTML = `
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr>
            <th>日付</th><th>スタッフ</th><th>店舗</th><th>状態</th>
            <th>出勤</th><th>退勤</th><th>休憩</th><th>操作</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <p class="correction-result-count">${records.length}件の打刻データ</p>`;
  }

  // 修正履歴の表示
  window._viewCorrectionHistory = async function(recordId) {
    const q = query(collection(db, 'correctionLogs'), where('recordId', '==', recordId), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    const histories = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal-card modal-card-wide">
        <h3 class="modal-title">修正履歴</h3>
        ${histories.length === 0 ? '<p class="empty-msg-sm">この打刻はまだ修正されていません</p>' :
          `<div class="history-list">
            ${histories.map(h => {
              const ts = h.createdAt ? (h.createdAt.toDate ? h.createdAt.toDate() : new Date(h.createdAt)) : null;
              return `<div class="history-item">
                <div class="history-meta">
                  <span class="history-editor">${h.editorName || h.editorId}</span>
                  <span class="history-time">${ts ? formatDate(ts) + ' ' + formatTime(ts) : ''}</span>
                </div>
                <div class="history-diff">
                  <span class="history-before">出勤 ${h.before.clockIn} / 退勤 ${h.before.clockOut} / 休憩 ${h.before.breakMinutes}m</span>
                  <span class="history-arrow">→</span>
                  <span class="history-after">出勤 ${h.after.clockIn} / 退勤 ${h.after.clockOut} / 休憩 ${h.after.breakMinutes}m</span>
                </div>
              </div>`;
            }).join('')}
          </div>`}
        <div class="modal-actions">
          <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">閉じる</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  };

  // 設定
  async function renderSettings() {
    const content = document.getElementById('admin-content');
    const stores = await getAllStores();
    const allStaff = await getAllStaff();
    const storeMap = {}; stores.forEach(s => storeMap[s.id] = s.name);

    content.innerHTML = `
      <div class="admin-view">
        <div class="admin-view-header">
          <h2 class="admin-view-title">設定</h2>
        </div>
        <div class="settings-grid">
          <!-- 店舗管理 -->
          <div class="settings-block">
            <h3 class="settings-block-title">店舗管理</h3>
            <div class="table-wrap">
              <table class="data-table data-table-sm">
                <thead><tr><th>店舗名</th><th>住所</th><th>電話</th><th>状態</th><th>操作</th></tr></thead>
                <tbody>
                  ${stores.map(s => `<tr>
                    <td>${s.name}</td>
                    <td>${s.address || '—'}</td>
                    <td>${s.phone || '—'}</td>
                    <td>${s.active ? '<span class="badge-on">有効</span>' : '<span class="badge-off">無効</span>'}</td>
                    <td>
                      <button class="btn-sm" onclick="window._editStore('${s.id}')">編集</button>
                      <button class="btn-sm btn-danger" onclick="window._toggleStore('${s.id}',${!s.active})">${s.active ? '無効化' : '有効化'}</button>
                    </td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>
            <button class="btn-secondary" onclick="window._addStore()" style="margin-top:12px">+ 店舗追加</button>
          </div>

          <!-- スタッフ管理 -->
          <div class="settings-block">
            <h3 class="settings-block-title">スタッフ管理</h3>
            <div class="table-wrap">
              <table class="data-table data-table-sm">
                <thead><tr><th>名前</th><th>ID</th><th>店舗</th><th>時給</th><th>状態</th><th>操作</th></tr></thead>
                <tbody>
                  ${allStaff.map(s => `<tr>
                    <td>${s.name}</td>
                    <td class="mono">${s.staffId}</td>
                    <td>${storeMap[s.storeId] || '—'}</td>
                    <td>¥${(s.hourlyRate || 0).toLocaleString()}</td>
                    <td>${s.active !== false ? '<span class="badge-on">有効</span>' : '<span class="badge-off">無効</span>'}</td>
                    <td>
                      <button class="btn-sm" onclick="window._editStaff('${s.id}')">編集</button>
                    </td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>
            <button class="btn-secondary" onclick="window._addStaff()" style="margin-top:12px">+ スタッフ追加</button>
          </div>
        </div>
      </div>`;

    window._editStore = async function(storeId) {
      const snap = await getDoc(doc(db, 'stores', storeId));
      const s = snap.data();
      showStoreModal(storeId, s);
    };
    window._addStore = function() { showStoreModal(null, {}); };
    window._toggleStore = async function(storeId, active) {
      await updateDoc(doc(db, 'stores', storeId), { active });
      showSuccess(active ? '店舗を有効化しました' : '店舗を無効化しました');
      await renderSettings();
    };
    window._editStaff = async function(staffId) {
      editingStaffId = staffId;
      const snap = await getDoc(doc(db, 'staff', staffId));
      showStaffModal(staffId, snap.data(), storeMap, stores);
    };
    window._addStaff = function() {
      editingStaffId = null;
      showStaffModal(null, {}, storeMap, stores);
    };
  }

  function showStoreModal(storeId, data) {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal-card">
        <h3 class="modal-title">${storeId ? '店舗編集' : '店舗追加'}</h3>
        <div class="form-group">
          <label class="form-label">店舗名</label>
          <input type="text" id="store-name" class="form-input" value="${data.name || ''}">
        </div>
        <div class="form-group">
          <label class="form-label">住所</label>
          <input type="text" id="store-addr" class="form-input" value="${data.address || ''}">
        </div>
        <div class="form-group">
          <label class="form-label">電話番号</label>
          <input type="text" id="store-phone" class="form-input" value="${data.phone || ''}">
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">キャンセル</button>
          <button class="btn-primary" onclick="window._saveStore('${storeId || ''}')">保存</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  window._saveStore = async function(storeId) {
    const name = document.getElementById('store-name').value.trim();
    const address = document.getElementById('store-addr').value.trim();
    const phone = document.getElementById('store-phone').value.trim();
    if (!name) { showError('店舗名を入力してください'); return; }
    const data = { name, address, phone, active: true };
    if (storeId) {
      await updateDoc(doc(db, 'stores', storeId), data);
    } else {
      await addDoc(collection(db, 'stores'), { ...data, createdAt: serverTimestamp() });
    }
    document.querySelector('.modal-overlay')?.remove();
    showSuccess('店舗情報を保存しました');
    await renderSettings();
  };

  function showStaffModal(staffId, data, storeMap, stores) {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal-card">
        <h3 class="modal-title">${staffId ? 'スタッフ編集' : 'スタッフ追加'}</h3>
        <div class="form-group">
          <label class="form-label">名前</label>
          <input type="text" id="sf-name" class="form-input" value="${data.name || ''}">
        </div>
        <div class="form-group">
          <label class="form-label">スタッフID（ログインID）</label>
          <input type="text" id="sf-id" class="form-input" value="${data.staffId || ''}" ${staffId ? 'readonly' : ''}>
        </div>
        <div class="form-group">
          <label class="form-label">パスワード</label>
          <input type="text" id="sf-pass" class="form-input" value="${data.password || ''}" placeholder="${staffId ? '変更する場合のみ入力' : ''}">
        </div>
        <div class="form-group">
          <label class="form-label">所属店舗</label>
          <select id="sf-store" class="form-input">
            ${stores.map(s => `<option value="${s.id}" ${data.storeId === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">役職・ポジション</label>
          <input type="text" id="sf-role" class="form-input" value="${data.role || ''}" placeholder="例: スタイリスト">
        </div>
        <div class="form-group">
          <label class="form-label">時給（円）</label>
          <input type="number" id="sf-rate" class="form-input" value="${data.hourlyRate || 1000}" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">管理メモ</label>
          <textarea id="sf-memo" class="form-textarea">${data.adminMemo || ''}</textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">キャンセル</button>
          ${staffId ? `<button class="btn-danger btn-sm" onclick="window._toggleStaffActive('${staffId}',${data.active === false})">
            ${data.active === false ? '有効化' : '無効化'}</button>` : ''}
          <button class="btn-primary" onclick="window._saveStaff('${staffId || ''}')">保存</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  window._saveStaff = async function(staffId) {
    const name = document.getElementById('sf-name').value.trim();
    const sfId = document.getElementById('sf-id').value.trim();
    const pass = document.getElementById('sf-pass').value.trim();
    const storeId = document.getElementById('sf-store').value;
    const role = document.getElementById('sf-role').value.trim();
    const hourlyRate = parseInt(document.getElementById('sf-rate').value) || 1000;
    const adminMemo = document.getElementById('sf-memo').value.trim();
    if (!name || !sfId) { showError('名前とIDは必須です'); return; }
    const data = { name, staffId: sfId, storeId, role, hourlyRate, adminMemo, active: true };
    if (pass) data.password = pass;
    if (staffId) {
      await updateDoc(doc(db, 'staff', staffId), data);
    } else {
      if (!pass) { showError('新規スタッフはパスワードが必要です'); return; }
      await addDoc(collection(db, 'staff'), { ...data, createdAt: serverTimestamp() });
    }
    document.querySelector('.modal-overlay')?.remove();
    showSuccess('スタッフ情報を保存しました');
    await renderSettings();
  };

  window._toggleStaffActive = async function(staffId, active) {
    await updateDoc(doc(db, 'staff', staffId), { active });
    document.querySelector('.modal-overlay')?.remove();
    showSuccess(active ? 'スタッフを有効化しました' : 'スタッフを無効化しました');
    await renderSettings();
  };

  // ─── 起動 ─────────────────────────────────────────────────────────
  async function main() {
    showLoading(true);
    try {
      await initializeData();
    } catch(e) {
      console.warn('Init error (may be already initialized):', e);
    }
    showLoading(false);
    showLogin();
  }

  main();
</script>

<style>
/* ─── CSS 変数 ─────────────────────────────────────────────── */
:root {
  --bg: #0f0e0d;
  --bg2: #1a1917;
  --bg3: #242220;
  --bg4: #2e2c29;
  --surface: #1e1c1a;
  --border: #333230;
  --border-light: #3d3b38;
  --text: #f0ede8;
  --text-2: #b8b4ae;
  --text-3: #7a766f;
  --accent: #c9a96e;
  --accent-hover: #d4b880;
  --accent-dim: rgba(201,169,110,0.15);
  --green: #6fcf97;
  --green-dim: rgba(111,207,151,0.15);
  --amber: #f2c94c;
  --amber-dim: rgba(242,201,76,0.15);
  --red: #eb5757;
  --red-dim: rgba(235,87,87,0.15);
  --blue: #56ccf2;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --radius: 10px;
  --radius-sm: 6px;
  --font-display: 'Shippori Mincho', serif;
  --font-mono: 'DM Mono', monospace;
  --font-body: 'Noto Sans JP', sans-serif;
  --transition: 0.18s ease;
}

/* ─── リセット ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
button { cursor: pointer; font-family: inherit; border: none; background: none; }
input, select, textarea { font-family: inherit; }

/* ─── ローディング ──────────────────────────────────────────── */
#loading-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(15,14,13,0.8);
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.loading-spinner {
  width: 40px; height: 40px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── トースト ──────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  z-index: 9998; padding: 12px 24px; border-radius: var(--radius);
  font-size: 0.9rem; font-weight: 500; pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  opacity: 0;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast-error { background: var(--red); color: #fff; }
.toast-success { background: var(--green); color: #0f0e0d; }

/* ─── ログイン画面 ──────────────────────────────────────────── */
.login-wrapper {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  background: radial-gradient(ellipse at 30% 40%, #1e1a14 0%, var(--bg) 60%);
}
.login-card {
  position: relative; z-index: 2;
  width: 100%; max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px;
  box-shadow: var(--shadow), 0 0 60px rgba(201,169,110,0.06);
}
.login-brand { text-align: center; margin-bottom: 36px; }
.brand-mark {
  font-size: 2rem; color: var(--accent); margin-bottom: 12px;
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
.brand-title {
  font-family: var(--font-display);
  font-size: 1.8rem; letter-spacing: 0.12em;
  color: var(--text); line-height: 1.2;
}
.brand-sub { color: var(--text-3); font-size: 0.8rem; margin-top: 6px; letter-spacing: 0.08em; }
.login-form { display: flex; flex-direction: column; gap: 16px; }
.login-deco { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.deco-circle {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, var(--accent-dim), transparent 70%);
}
.c1 { width: 400px; height: 400px; top: -150px; right: -100px; }
.c2 { width: 300px; height: 300px; bottom: -100px; left: -80px; }
.c3 { width: 200px; height: 200px; top: 40%; left: 20%; opacity: 0.5; }

/* ─── フォーム部品 ──────────────────────────────────────────── */
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 0.78rem; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; }
.form-input {
